<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingeist | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&display=swap');
        body { background-color: #0a0a0a; font-family: 'JetBrains Mono', monospace; color: #e0e0e0; }
        .glow { text-shadow: 0 0 10px rgba(0, 255, 170, 0.5); }
        .scanline {
            width: 100%; height: 2px; background: rgba(255, 255, 255, 0.03);
            position: absolute; animation: move 8s linear infinite;
        }
        @keyframes move { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 overflow-hidden">
    <div class="scanline"></div>
    
    <main class="max-w-2xl text-center z-10">
        <h1 class="text-4xl md:text-6xl font-bold mb-4 tracking-tighter glow text-emerald-400">
            BINGEIST<span class="animate-pulse">_</span>
        </h1>
        
        <p class="text-lg md:text-xl text-gray-400 mb-8 leading-relaxed">
            The AI-intelligent filter for your next obsession. <br>
            Curation automated. Noise minimized. Binge maximized.
        </p>

        <div class="bg-gray-900/50 border border-gray-800 p-4 rounded-lg mb-10 inline-block w-full">
            <span class="text-emerald-500 font-bold">$ </span>
            <span id="vibe-text" class="text-gray-300">Searching for "Dark Seinen like Vinland Saga"...</span>
        </div>

        <form class="flex flex-col md:flex-row gap-2 w-full max-w-md mx-auto">
            <input type="email" placeholder="you@example.com" required 
                class="bg-transparent border border-gray-700 px-4 py-3 rounded outline-none focus:border-emerald-400 transition-all flex-grow text-sm">
            <button type="submit" 
                class="bg-emerald-500 hover:bg-emerald-400 text-black font-bold py-3 px-8 rounded transition-all text-sm">
                JOIN BETA
            </button>
        </form>
        
        <p class="mt-6 text-xs text-gray-600 uppercase tracking-widest">
            Ready to disrupt the watch-list. 2026.
        </p>
    </main>

    <script>
        const vibes = [
            "Hyper-personalized recommendations...",
            "Affiliate-linked watch buttons...",
            "Zero-manual data entry...",
            "AI-driven community management..."
        ];
        let i = 0;
        setInterval(() => {
            document.getElementById('vibe-text').innerText = vibes[i];
            i = (i + 1) % vibes.length;
        }, 3000);
    </script>
</body>
</html>
